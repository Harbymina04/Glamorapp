version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: glamorapp
      POSTGRES_USER: glamorapp
      POSTGRES_PASSWORD: glamorapp_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glamorapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  openwa:
    image: devlikeapro/waha:latest
    environment:
      WHATSAPP_DEFAULT_ENGINE: NOWEB
      WHATSAPP_API_KEY: glamorapp_wa_2026
    ports:
      - "8081:3000"
    volumes:
      - openwa_data:/app/.sessions
    restart: unless-stopped

volumes:
  pgdata:
  minio_data:
  openwa_data:
